name: Build Android APK from ZIP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract the ZIP file
        # This command finds any zip file in your repo and extracts it to a new folder
        run: unzip -q *.zip -d extracted_app

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17' 

      - name: Locate and Build APK
        run: |
          # The ZIP might contain a root folder, so this dynamically finds where the build file is
          GRADLE_DIR=$(dirname $(find . -name "gradlew" | head -n 1))
          cd $GRADLE_DIR
          
          # Make Gradle executable and compile the app
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-studio-app
          # This wildcard path ensures it finds the APK no matter how the folder is named
          path: extracted_app/**/app/build/outputs/apk/debug/app-debug.apk
