name: Build Android APK from ZIP
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract the ZIP file
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: Could not find any .zip file in the repository!"
            exit 1
          fi
          echo "Extracting $ZIP_FILE..."
          unzip -q "$ZIP_FILE" -d extracted_app

      - name: Set up Java
        uses: actions/setup-java@v4 
        with:
          distribution: 'temurin'
          java-version: '17' 

      - name: Locate and Build APK
        run: |
          # Look for the core Gradle settings file instead of gradlew
          PROJECT_FILE=$(find . -name "settings.gradle*" | head -n 1)
          
          # Fallback to build.gradle if settings is missing
          if [ -z "$PROJECT_FILE" ]; then
             PROJECT_FILE=$(find . -name "build.gradle*" | head -n 1)
          fi
          
          if [ -z "$PROJECT_FILE" ]; then
             echo "Error: Gradle project files not found! AI Studio didn't generate a valid project."
             exit 1
          fi
          
          # Navigate into the extracted project directory
          cd $(dirname "$PROJECT_FILE")
          
          echo "Generating missing gradlew file..."
          gradle wrapper
          
          echo "Building the APK..."
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-studio-app
          path: extracted_app/**/app/build/outputs/apk/debug/app-debug.apk
