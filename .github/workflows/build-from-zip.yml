name: Build Android APK from ZIP
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract the ZIP file
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: Could not find any .zip file in the repository!"
            exit 1
          fi
          echo "Extracting $ZIP_FILE..."
          unzip -q "$ZIP_FILE" -d extracted_app

      - name: Set up Java
        uses: actions/setup-java@v4 
        with:
          distribution: 'temurin'
          java-version: '17' 

      - name: Generate Missing Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          PROJECT_FILE=$(find . -name "settings.gradle*" | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
             PROJECT_FILE=$(find . -name "build.gradle*" | head -n 1)
          fi
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          cp ~/.android/debug.keystore "$PROJECT_DIR/debug.keystore"
          echo "Debug keystore successfully created!"

      - name: Locate and Build APK
        run: |
          PROJECT_FILE=$(find . -name "settings.gradle*" | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
             PROJECT_FILE=$(find . -name "build.gradle*" | head -n 1)
          fi
          
          cd $(dirname "$PROJECT_FILE")
          
          echo "Generating missing gradlew file..."
          gradle wrapper
          
          echo "Building the APK..."
          chmod +x ./gradlew
          ./gradlew assembleDebug -Djava.awt.headless=true --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-studio-app
          path: extracted_app/**/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-studio-app
          path: extracted_app/**/app/build/outputs/apk/debug/app-debug.apk
        with:
          name: my-ai-studio-app
          path: extracted_app/**/app/build/outputs/apk/debug/app-debug.apk
