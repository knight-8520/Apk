name: Build Android APK from ZIP
on:
  workflow_dispatch:

env:
  # This silences the Node.js 20 warning you were seeing
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract the ZIP file
        run: |
          # This securely finds the zip file even if it has spaces in the name
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: Could not find any .zip file in the repository!"
            exit 1
          fi
          echo "Extracting $ZIP_FILE..."
          unzip -q "$ZIP_FILE" -d extracted_app

      - name: Set up Java
        # Updated to v4 to fix the Node.js deprecation warning
        uses: actions/setup-java@v4 
        with:
          distribution: 'temurin'
          java-version: '17' 

      - name: Locate and Build APK
        run: |
          # Find the gradlew file safely
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_PATH" ]; then
             echo "Error: gradlew not found! AI Studio may not have generated a valid Android project."
             exit 1
          fi
          
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          cd "$GRADLE_DIR"
          
          echo "Building the APK..."
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-studio-app
          path: extracted_app/**/app/build/outputs/apk/debug/app-debug.apk
